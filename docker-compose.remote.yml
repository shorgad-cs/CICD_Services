version: '3.8'

services:
  # 1. Python Flask Backend
  python-service:
    image: ${DOCKERHUB_USERNAME}/python-service:latest
    container_name: python-app-remote
    ports:
      - "5002:5002"
    networks:
      - microservices-network

  # 2. .NET 10 Weather Backend
  dotnet-service:
    image: ${DOCKERHUB_USERNAME}/dotnet-service:latest
    container_name: dotnet-app-remote
    ports:
      - "5001:5001"
    networks:
      - microservices-network

  # 3. Node.js Express Gateway
  nodejs-service:
    image: ${DOCKERHUB_USERNAME}/nodejs-service:latest
    container_name: nodejs-app-remote
    ports:
      - "3000:3000"
    environment:
      - PYTHON_SERVICE_URL=http://python-service:5002/api/python
      - DOTNET_SERVICE_URL=http://dotnet-service:5001/weatherforecast
    depends_on:
      - python-service
      - dotnet-service
    networks:
      - microservices-network

# Define the isolated shared network bridge
networks:
  microservices-network:
    driver: bridge
